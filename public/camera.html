<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeTheChange | Snap a Picture</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .back-link {
            text-decoration: none;
            color: var(--primary-blue);
            font-size: 20px;
            margin-bottom: 10px;
            display: inline-block;
        }

        .page-title {
            font-size: 18px;
            color: var(--primary-blue);
            font-weight: 700;
            margin-bottom: 20px;
            text-align: center;
        }

        /* === LIVE CAMERA VIEW === */
        .camera-live {
            position: relative;
            width: 100%;
            aspect-ratio: 3/4;
            background: #111;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .shutter-btn {
            position: absolute;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            width: 56px;
            height: 56px;
            background: white;
            border-radius: 50%;
            border: 4px solid rgba(255, 255, 255, 0.4);
            cursor: pointer;
            z-index: 10;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        /* === PREVIEW VIEW (after capture) === */
        .preview-section {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Polaroid card with dynamic frame overlay */
        .polaroid-preview {
            background: #fff;
            padding: 0;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.12);
            border-radius: 4px;
            display: inline-block;
            position: relative;
            max-width: 300px;
            width: 80%;
            overflow: hidden;
            aspect-ratio: 3/4;
        }

        .polaroid-preview .photo-frame {
            width: 100%;
            height: 100%;
            position: relative;
            background: #fff;
            overflow: hidden;
        }

        .polaroid-preview .photo-frame .user-photo {
            position: absolute;
            top: 7%;
            left: 10%;
            width: 80%;
            height: 68%;
            object-fit: cover;
            display: block;
            z-index: 1;
        }

        .polaroid-preview .frame-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            pointer-events: none;
            z-index: 2;
        }

        .preview-message {
            width: 100%;
            padding: 5px 10px 10px 10px;
            text-align: center;
            font-size: 14px;
            font-weight: 500;
            color: #333;
            min-height: 20px;
            word-wrap: break-word;
        }

        .retake-btn-wrap {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }

        .btn-retake {
            background: rgba(0, 48, 135, 0.8);
            color: white;
            border: none;
            border-radius: 6px;
            padding: 8px 18px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            backdrop-filter: blur(4px);
        }

        .upload-section {
            width: 100%;
            margin-top: 20px;
        }
    </style>
</head>

<body>
    <div class="container">
        <a href="pledge.html" class="back-link">&lt;</a>
        <h2 class="page-title">Snap a picture of yourself</h2>

        <!-- LIVE CAMERA (shown initially) -->
        <div id="cameraView" class="camera-live">
            <video id="video" autoplay playsinline></video>
            <button id="shutter" class="shutter-btn"></button>
        </div>

        <!-- PREVIEW (shown after capture) -->
        <div id="previewView" class="preview-section hidden">
            <div id="polaroidContainer" class="polaroid-preview">
                <div class="photo-frame">
                    <img id="capturedPhoto" src="" alt="Your Photo" class="user-photo">
                    <img id="frameOverlay" src="/assets/default-frame.png" alt="Frame" class="frame-overlay">
                </div>
                <!-- Dynamic user message will appear here -->
                <div id="previewMessage" class="preview-message"></div>
                <div class="retake-btn-wrap">
                    <button id="retake" class="btn-retake">Retake <span style="font-size:16px;">↻</span></button>
                </div>
            </div>
            <div class="upload-section">
                <button id="upload" class="btn-primary">Upload</button>
            </div>
        </div>
    </div>

    <!-- Footer Waves -->
    <div class="footer-waves">
        <svg class="wave-svg" viewBox="0 0 1440 320" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
            <path fill="#013188" d="M0,160 C320,300 1120,40 1440,240 L1440,320 L0,320 Z"></path>
            <path fill="#D0021B" d="M0,220 C480,350 1200,100 1440,280 L1440,320 L0,320 Z" style="opacity:0.9;"></path>
        </svg>
    </div>

    <div id="loading" class="loading-overlay hidden">
        <div class="spinner"></div>
    </div>

    <script>
        // Must have filled the pledge form first
        if (!sessionStorage.getItem('pledge_name')) {
            window.location.href = 'pledge.html';
        }

        const video = document.getElementById('video');
        const capturedPhoto = document.getElementById('capturedPhoto');
        const shutter = document.getElementById('shutter');
        const retakeBtn = document.getElementById('retake');
        const uploadBtn = document.getElementById('upload');
        const cameraView = document.getElementById('cameraView');
        const previewView = document.getElementById('previewView');
        const loading = document.getElementById('loading');

        let stream;
        let activeFrameUrl = '/assets/default-frame.png';

        // Hidden canvas to capture raw photo for upload
        const rawCanvas = document.createElement('canvas');

        async function fetchActiveFrame() {
            try {
                const res = await fetch('/api/frame/active');
                const data = await res.json();
                activeFrameUrl = data.url || '/assets/default-frame.png';
                document.getElementById('frameOverlay').src = activeFrameUrl;
            } catch (err) {
                console.error('Failed to fetch active frame:', err);
                document.getElementById('frameOverlay').src = activeFrameUrl;
            }
        }

        async function startCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'user', width: { ideal: 720 }, height: { ideal: 960 } }
                });
                video.srcObject = stream;
            } catch (err) {
                alert('Please allow camera access.');
            }
        }

        // SHUTTER: Capture photo, show framed preview
        shutter.onclick = () => {
            // Capture raw photo to hidden canvas
            const vw = video.videoWidth || 720;
            const vh = video.videoHeight || 960;
            rawCanvas.width = vw;
            rawCanvas.height = vh;
            rawCanvas.getContext('2d').drawImage(video, 0, 0, vw, vh);

            // Stop camera
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }

            // Show captured photo inside the HTML polaroid card
            capturedPhoto.src = rawCanvas.toDataURL('image/jpeg', 0.9);

            // Set user message preview
            const msg = sessionStorage.getItem('pledge_msg');
            const msgEl = document.getElementById('previewMessage');
            if (msg) {
                msgEl.textContent = `"${msg}"`;
                msgEl.style.display = 'block';
            } else {
                msgEl.style.display = 'none';
            }

            // Switch views
            cameraView.classList.add('hidden');
            previewView.classList.remove('hidden');
        };

        // RETAKE: Go back to camera
        retakeBtn.onclick = () => {
            previewView.classList.add('hidden');
            cameraView.classList.remove('hidden');
            startCamera();
        };

        // UPLOAD: Send resized photo to server (server applies frame)
        uploadBtn.onclick = async () => {
            const loading = document.getElementById('loading');
            const statusText = document.createElement('div');
            statusText.id = 'queueStatus';
            statusText.style.color = 'white';
            statusText.style.marginTop = '10px';
            statusText.style.fontSize = '14px';

            loading.classList.remove('hidden');
            loading.querySelector('.spinner').after(statusText);
            statusText.textContent = 'Optimizing photo...';

            // 1. Client-side resize (Target: Max 1000px)
            const MAX_DIM = 1000;
            let width = rawCanvas.width;
            let height = rawCanvas.height;

            if (width > height) {
                if (width > MAX_DIM) {
                    height *= MAX_DIM / width;
                    width = MAX_DIM;
                }
            } else {
                if (height > MAX_DIM) {
                    width *= MAX_DIM / height;
                    height = MAX_DIM;
                }
            }

            const scaleCanvas = document.createElement('canvas');
            scaleCanvas.width = width;
            scaleCanvas.height = height;
            scaleCanvas.getContext('2d').drawImage(rawCanvas, 0, 0, width, height);

            statusText.textContent = 'Uploading...';

            // 2. Convert to smaller blob and upload
            scaleCanvas.toBlob(async (blob) => {
                const formData = new FormData();
                formData.append('photo', blob, 'pledge.jpg');
                formData.append('name', sessionStorage.getItem('pledge_name'));
                formData.append('organisation', sessionStorage.getItem('pledge_org') || '');
                formData.append('message', sessionStorage.getItem('pledge_msg') || '');

                try {
                    const res = await fetch('/api/upload', { method: 'POST', body: formData });
                    const data = await res.json();
                    if (data.jobId) pollStatus(data.jobId);
                    else {
                        alert(data.error || 'Upload failed');
                        loading.classList.add('hidden');
                        statusText.remove();
                    }
                } catch (err) {
                    alert('Upload failed. Try again.');
                    loading.classList.add('hidden');
                    statusText.remove();
                }
            }, 'image/jpeg', 0.85);
        };

        async function pollStatus(jobId) {
            const statusText = document.getElementById('queueStatus');
            const interval = setInterval(async () => {
                try {
                    const res = await fetch(`/api/upload/status/${jobId}`);
                    const data = await res.json();

                    if (data.status === 'done') {
                        clearInterval(interval);
                        sessionStorage.setItem('last_photo', data.photo.photo_url);
                        window.location.href = 'success.html';
                    } else if (data.status === 'error') {
                        clearInterval(interval);
                        alert('Processing error: ' + data.error);
                        loading.classList.add('hidden');
                        statusText.remove();
                    } else if (data.status === 'queued' || data.status === 'processing') {
                        // Display queue position if provided by server
                        if (data.queueSize !== undefined) {
                            statusText.textContent = `Processing... (Queue position: ${data.queueSize})`;
                        } else {
                            statusText.textContent = 'Processing in queue...';
                        }
                    }
                } catch (e) {
                    clearInterval(interval);
                    alert('Connection error');
                    loading.classList.add('hidden');
                    statusText.remove();
                }
            }, 2000);
        }

        fetchActiveFrame();
        startCamera();
    </script>
</body>

</html>
