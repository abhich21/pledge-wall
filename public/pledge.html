<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeTheChange | Pledge Details</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .page-title {
            font-size: 24px;
            color: var(--primary-blue);
            font-weight: 700;
            margin-bottom: 40px;
            text-align: center;
        }

        .back-link {
            text-decoration: none;
            color: var(--primary-blue);
            font-size: 20px;
            margin-bottom: 20px;
            display: inline-block;
        }
    </style>
</head>

<body>
    <div class="container">
        <a href="index.html" class="back-link">&lt;</a>

        <h2 class="page-title">Enter your details</h2>

        <form id="pledgeForm">
            <div class="input-group">
                <label class="input-label">Name</label>
                <input type="text" id="userName" class="input-field" placeholder="Enter full name" required>
            </div>

            <div class="input-group">
                <label class="input-label">Organisation</label>
                <input type="text" id="userOrg" class="input-field" placeholder="Enter full organisation name">
            </div>

            <div class="input-group">
                <label class="input-label" style="display: flex; justify-content: space-between;">
                    <span>Message</span>
                    <span id="wordCount" style="font-size: 12px; font-weight: normal; color: #666;">0/20 words</span>
                </label>
                <textarea id="userMsg" class="input-field" placeholder="Write a short message or pledge..." rows="3" style="resize: none;"></textarea>
            </div>

            <button type="submit" class="btn-primary" style="margin-top: 10px;">Take Photo</button>
        </form>
    </div>

    <!-- Curvilinear Footer Waves -->
    <div class="footer-waves">
        <svg class="wave-svg" viewBox="0 0 1440 320" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
            <path fill="#013188" d="M0,160 C320,300 1120,40 1440,240 L1440,320 L0,320 Z"></path>
            <path fill="#D0021B" d="M0,220 C480,350 1200,100 1440,280 L1440,320 L0,320 Z" style="opacity:0.9;"></path>
        </svg>
    </div>

    <script>
        const form = document.getElementById('pledgeForm');
        const msgInput = document.getElementById('userMsg');
        const wordCountDisplay = document.getElementById('wordCount');

        // Word counter logic
        msgInput.addEventListener('input', function() {
            let words = this.value.trim().split(/\s+/).filter(word => word.length > 0);
            
            if (words.length > 20) {
                // Trim to 20 words
                words = words.slice(0, 20);
                this.value = words.join(" ") + " ";
                this.style.borderColor = "var(--primary-red)";
            } else {
                this.style.borderColor = "#ddd";
            }
            
            wordCountDisplay.textContent = `${words.length}/20 words`;
            wordCountDisplay.style.color = words.length === 20 ? "var(--primary-red)" : "#666";
        });

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const name = document.getElementById('userName').value.trim();
            const org = document.getElementById('userOrg').value.trim();
            const msg = document.getElementById('userMsg').value.trim();

            sessionStorage.setItem('pledge_name', name);
            sessionStorage.setItem('pledge_org', org);
            sessionStorage.setItem('pledge_msg', msg); // Saves the actual message

            window.location.href = 'camera.html';
        });
    </script>
</body>

</html>
