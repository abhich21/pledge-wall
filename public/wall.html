<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeTheChange | Pledge Wall</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="/socket.io/socket.io.js"></script>
    <script src="js/socket-client.js"></script>
    <style>
        body {
            background: #fdfdfd;
            margin: 0;
            padding: 0 !important;
            overflow: hidden;
        }

        .wall-header h1 {
            font-size: 32px;
            margin: 0;
            padding: 10px 0;
            background: rgba(255, 255, 255, 0.8);
            position: relative;
            z-index: 1000;
        }

        .wall-header .heart-icon {
            font-size: 24px;
            color: var(--primary-red);
        }

        .wall-grid {
            position: relative;
            width: 100vw;
            height: calc(100vh - 120px);
            overflow: hidden;
            background: #fafafa;
        }

        .wall-item {
            position: absolute;
            transition: all 0.5s ease;
            z-index: 1;
        }

        .wall-item .polaroid-card {
            width: var(--card-width, 150px);
            transform: rotate(var(--rotation, 0deg));
            transition: width 0.5s ease, transform 0.3s;
        }

        .wall-item:hover {
            z-index: 999 !important;
        }

        .wall-item:hover .polaroid-card {
            transform: scale(1.2) rotate(0deg);
        }

        .author-name {
            font-size: 10px;
            font-weight: 700;
            margin-top: 3px;
            color: var(--primary-blue);
            text-align: center;
        }

        .pledge-text {
            font-size: 8px;
            line-height: 1.1;
            color: #666;
            margin-top: 2px;
            text-align: center;
            font-style: italic;
        }
    </style>
</head>

<body class="wall-container">
    <div class="wall-header">
        <h1 class="text-red">#BeTheChange <span class="heart-icon">❤️</span></h1>
    </div>

    <div id="wallGrid" class="wall-grid">
        <!-- New photos will be injected here -->
    </div>

    <div class="wall-stats">
        <span id="pledgeCount">0</span> Pledges ❤️
    </div>

    <script>
        const grid = document.getElementById('wallGrid');
        const countDisplay = document.getElementById('pledgeCount');
        let photos = [];
        let lastTimestamp = null;
        let baseZIndex = 1;

        const socket = initSocket('/wall');

        function calculateCardSize(count) {
            // Logic to shrink cards as count increases
            // 1-20: 200px
            // 21-100: Scale from 200px down to 100px
            // 101-500: Scale from 100px down to 50px
            if (count <= 20) return 200;
            if (count <= 100) return 200 - ((count - 20) * (100 / 80));
            if (count <= 500) return 100 - ((count - 100) * (50 / 400));
            return 50;
        }

        function updateDynamicLayout() {
            const cardWidth = calculateCardSize(photos.length);
            document.documentElement.style.setProperty('--card-width', `${cardWidth}px`);
        }

        async function fetchPhotos() {
            try {
                const res = await fetch('/api/photos');
                const data = await res.json();
                photos = data;
                renderWall();
                if (photos.length > 0) {
                    lastTimestamp = photos[photos.length - 1].created_at;
                }
            } catch (err) {
                console.error('Failed to fetch photos', err);
            }
        }

        function renderWall() {
            grid.innerHTML = '';
            updateDynamicLayout();

            photos.sort((a, b) => new Date(a.created_at) - new Date(b.created_at));

            const fragment = document.createDocumentFragment();
            photos.forEach((photo, index) => {
                const el = createPhotoElement(photo, index);
                fragment.appendChild(el);
            });
            grid.appendChild(fragment);
            updateStats();
        }

        let occupiedCells = new Set();
        let gridCols = 0;
        let gridRows = 0;

        function computeGrid() {
            const cardWidth = calculateCardSize(photos.length);
            const padding = 10;
            const cellW = cardWidth + padding;
            const cellH = (cardWidth * 1.3) + padding; // polaroid aspect ratio
            const wallW = grid.clientWidth;
            const wallH = grid.clientHeight;
            gridCols = Math.floor(wallW / cellW);
            gridRows = Math.floor(wallH / cellH);
            return { cellW, cellH, wallW, wallH };
        }

    
        function xmur3(str) {
            for(var i = 0, h = 1779033703 ^ str.length; i < str.length; i++) {
                h = Math.imul(h ^ str.charCodeAt(i), 3432918353);
                h = h << 13 | h >>> 19;
            } return function() {
                h = Math.imul(h ^ (h >>> 16), 2246822507);
                h = Math.imul(h ^ (h >>> 13), 3266489909);
                return (h ^= h >>> 16) >>> 0;
            }
        }

        function mulberry32(a) {
            return function() {
                var t = a += 0x6D2B79F5;
                t = Math.imul(t ^ t >>> 15, t | 1);
                t ^= t + Math.imul(t ^ t >>> 7, t | 61);
                return ((t ^ t >>> 14) >>> 0) / 4294967296;
            }
        }

        function getSeededRandom(seedStr) {
            const seed = xmur3(seedStr)();
            return mulberry32(seed);
        }

        // --- Global Deterministic Shuffle for Random Cell Placement ---
        let shuffledCells = [];
        let previousTotalCells = 0;

        // A globally seeded PRNG for generating the cell filling sequence
        function getGlobalSeededRandom() {
            return mulberry32(xmur3("wall-layout-seed-v1")());
        }

        function updateShuffledCells(totalCells) {
            if (totalCells === previousTotalCells) return;
            previousTotalCells = totalCells;
            shuffledCells = Array.from({length: totalCells}, (_, i) => i);
            const rng = getGlobalSeededRandom();
            // Fisher-Yates shuffle with seeded PRNG
            for (let i = totalCells - 1; i > 0; i--) {
                const j = Math.floor(rng() * (i + 1));
                const temp = shuffledCells[i];
                shuffledCells[i] = shuffledCells[j];
                shuffledCells[j] = temp;
            }
        }

        function getGridPosition(index, randomFn) {
            const { cellW, cellH, wallW, wallH } = computeGrid();
            const totalCells = gridCols * gridRows;
            
            updateShuffledCells(totalCells);

            if (index < totalCells) {
                // Get a deterministically randomized cell
                const cellIndex = shuffledCells[index];
                const col = cellIndex % gridCols;
                const row = Math.floor(cellIndex / gridCols);
                // Add small seeded jitter for natural feel (±10px)
                const jitterX = (randomFn() * 20 - 10);
                const jitterY = (randomFn() * 20 - 10);
                const left = (col * cellW) + jitterX;
                const top = (row * cellH) + jitterY;
                return { left: Math.max(0, left), top: Math.max(0, top) };
            } else {
                // Grid is FULL → seeded overlap mode
                const left = randomFn() * (wallW - cellW);
                const top = randomFn() * (wallH - cellH);
                return { left, top };
            }
        }

        function createPhotoElement(photo, index) {
            const div = document.createElement('div');
            div.className = 'wall-item';
            div.id = `photo-${photo._id}`;

            // Initialize seeded PRNG for this specific photo
            const randomFn = getSeededRandom(photo._id.toString());

            const rotation = (randomFn() * 10 - 5).toFixed(2); // subtle rotation
            const pos = getGridPosition(index, randomFn);

            div.style.left = `${pos.left}px`;
            div.style.top = `${pos.top}px`;
            div.style.zIndex = baseZIndex++;
            div.style.setProperty('--rotation', `${rotation}deg`);

            div.innerHTML = `
                <div class="polaroid-card">
                    <img src="${photo.photo_url}" class="polaroid-image" loading="lazy">
                    <div style="padding: 5px; background: white;">
                        <div class="author-name">${photo.name}</div>
                        ${photo.message ? `<div class="pledge-text">"${photo.message}"</div>` : ''}
                    </div>
                </div>
            `;
            return div;
        }

        function addPhotoToGrid(photo) {
            updateDynamicLayout();
            const el = createPhotoElement(photo, photos.length - 1);
            grid.appendChild(el);
        }

        function updateStats() {
            countDisplay.textContent = photos.length;
        }

        socket.on('new_photo', (photo) => {
            if (!photos.find(p => p._id.toString() === photo._id.toString())) {
                photos.push(photo);
                addPhotoToGrid(photo);
                updateStats();
                lastTimestamp = photo.created_at;
            }
        });

        socket.on('photo_deleted', (payload) => {
            const photoId = payload.id.toString();
            photos = photos.filter(p => (p._id || p.id).toString() !== photoId);
            const el = document.getElementById(`photo-${photoId}`);
            if (el) {
                el.style.transform = 'scale(0)';
                el.style.opacity = '0';
                setTimeout(() => el.remove(), 600);
            }
            updateStats();
        });

        socket.on('wall_cleared', () => {
            photos = [];
            grid.innerHTML = '';
            updateStats();
        });

        // Sync on reconnect
        window.addEventListener('socket-reconnect', async () => {
            if (lastTimestamp) {
                try {
                    const res = await fetch(`/api/photos/since/${lastTimestamp}`);
                    const newOnes = await res.json();
                    newOnes.forEach(p => {
                        if (!photos.find(old => old.id === p.id)) {
                            photos.push(p);
                            addPhotoToGrid(p);
                        }
                    });
                    if (newOnes.length > 0) {
                        lastTimestamp = newOnes[newOnes.length - 1].created_at;
                        updateStats();
                    }
                } catch (err) {
                    console.error('Re-sync failed', err);
                }
            }
        });

        fetchPhotos();
    </script>
</body>

</html>
