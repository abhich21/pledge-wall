<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeTheChange | Pledge Wall</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="/socket.io/socket.io.js"></script>
    <script src="js/socket-client.js"></script>
    <style>
        body {
            background: #fdfdfd;
        }

        .wall-header h1 {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .wall-header .heart-icon {
            font-size: 40px;
            color: var(--primary-red);
        }

        .grid-slot {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .wall-item .polaroid-card {
            width: 180px;
            transform: rotate(var(--rotation, 0deg));
            transition: transform 0.3s;
        }

        .wall-item:hover .polaroid-card {
            transform: scale(1.1) rotate(0deg);
            z-index: 100;
        }

        .author-name {
            font-size: 11px;
            margin-top: 5px;
            color: #555;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
            text-align: center;
        }
    </style>
</head>

<body class="wall-container">
    <div class="wall-header">
        <h1 class="text-red">#BeTheChange <span class="heart-icon">❤️</span></h1>
    </div>

    <div id="wallGrid" class="wall-grid">
        <!-- New photos will be injected here -->
    </div>

    <div class="wall-stats">
        <span id="pledgeCount">0</span> Pledges and Counting ❤️
    </div>

    <script>
        const grid = document.getElementById('wallGrid');
        const countDisplay = document.getElementById('pledgeCount');
        let photos = [];
        let lastTimestamp = null;

        const socket = initSocket('/wall');

        async function fetchPhotos() {
            try {
                const res = await fetch('/api/photos');
                const data = await res.json();
                photos = data;
                renderWall();
                if (photos.length > 0) {
                    lastTimestamp = photos[photos.length - 1].created_at;
                }
            } catch (err) {
                console.error('Failed to fetch photos', err);
            }
        }

        function renderWall() {
            grid.innerHTML = '';
            photos.sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
            photos.forEach(addPhotoToGrid);
            updateStats();
        }

        function addPhotoToGrid(photo) {
            const div = document.createElement('div');
            div.className = 'wall-item';
            div.id = `photo-${photo.id}`;

            const rotation = (Math.random() * 10 - 5).toFixed(2);
            div.style.setProperty('--rotation', `${rotation}deg`);

            div.innerHTML = `
                <div class="polaroid-card">
                    <img src="${photo.photo_url}" class="polaroid-image" loading="lazy">
                    <div class="author-name">${photo.name}</div>
                </div>
            `;
            grid.prepend(div); // Newest first for visual impact
        }

        function updateStats() {
            countDisplay.textContent = photos.length;
        }

        socket.on('new_photo', (photo) => {
            if (!photos.find(p => p.id === photo.id)) {
                photos.push(photo);
                addPhotoToGrid(photo);
                updateStats();
                lastTimestamp = photo.created_at;
            }
        });

        socket.on('photo_deleted', (payload) => {
            photos = photos.filter(p => p.id !== parseInt(payload.id));
            const el = document.getElementById(`photo-${payload.id}`);
            if (el) {
                el.style.transform = 'scale(0)';
                el.style.opacity = '0';
                setTimeout(() => el.remove(), 600);
            }
            updateStats();
        });

        socket.on('wall_cleared', () => {
            photos = [];
            grid.innerHTML = '';
            updateStats();
        });

        // Sync on reconnect
        window.addEventListener('socket-reconnect', async () => {
            if (lastTimestamp) {
                try {
                    const res = await fetch(`/api/photos/since/${lastTimestamp}`);
                    const newOnes = await res.json();
                    newOnes.forEach(p => {
                        if (!photos.find(old => old.id === p.id)) {
                            photos.push(p);
                            addPhotoToGrid(p);
                        }
                    });
                    if (newOnes.length > 0) {
                        lastTimestamp = newOnes[newOnes.length - 1].created_at;
                        updateStats();
                    }
                } catch (err) {
                    console.error('Re-sync failed', err);
                }
            }
        });

        fetchPhotos();
    </script>
</body>

</html>
