<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeTheChange | Happy Women's Day</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .hero-section {
            padding-top: 40px;
            text-align: left;
        }

        .title-group {
            margin-bottom: 20px;
        }

        .main-title {
            font-size: 32px;
            color: var(--primary-red);
            line-height: 1.1;
            margin-bottom: 5px;
        }

        .sub-title {
            font-size: 24px;
            color: var(--primary-blue);
            font-weight: 800;
        }

        .copy-text {
            font-size: 14px;
            color: var(--primary-blue);
            line-height: 1.4;
            margin-bottom: 30px;
            max-width: 280px;
        }

        .graphic-container {
            margin: 20px 0;
            display: flex;
            justify-content: center;
        }

        .hero-graphic {
            width: 100%;
            max-width: 320px;
            display: block;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="hero-section">
            <div class="title-group">
                <h1 class="main-title">Happy</h1>
                <h1 class="main-title">Women's Day</h1>
                <div class="sub-title">#BeTheChange</div>
            </div>

            <p class="copy-text">
                Together, we pledge to respect, support, and empower every woman ensuring equity, dignity and
                opportunity for all.
            </p>

            <a href="pledge.html" class="btn-primary" style="max-width: 200px;">Pledge Now</a>

            <div class="graphic-container">
                <img src="/assets/womens_day_heart_graphic.png" alt="Happy Women's Day" class="hero-graphic">
            </div>
        </div>
    </div>

    <!-- Curvilinear Footer Waves -->
    <div class="footer-waves">
        <svg class="wave-svg" viewBox="0 0 1440 320" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
            <path fill="#013188" d="M0,160 C320,300 1120,40 1440,240 L1440,320 L0,320 Z"></path>
            <path fill="#D0021B" d="M0,220 C480,350 1200,100 1440,280 L1440,320 L0,320 Z" style="opacity:0.9;"></path>
        </svg>
    </div>
</body>

</html>
