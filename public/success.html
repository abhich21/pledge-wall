<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeTheChange | Success!</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .success-content {
            padding-top: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .preview-container {
            margin-bottom: 30px;
            transform: rotate(-1deg);
        }

        .hashtag-text {
            font-size: 28px;
            font-weight: 800;
            color: var(--primary-red);
            margin-top: 10px;
        }

        .btn-stack {
            width: 100%;
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="success-content">
            <div class="preview-container">
                <div class="polaroid-card" style="box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-radius: 4px; overflow: hidden; background: white;">
                    <img id="finalPhoto" src="" alt="Pledge Photo" class="polaroid-image" style="width: 100%; display: block;">
                    <div style="padding: 15px 10px; text-align: center;">
                        <div id="finalName" style="font-size: 18px; color: var(--primary-blue); font-weight: 700;"></div>
                        <div id="finalMessage" style="font-size: 14px; color: #666; font-style: italic; margin-top: 5px; display: none;"></div>
                    </div>
                </div>
            </div>

            <div class="btn-stack">
                <button id="shareBtn" class="btn-primary" style="background: var(--primary-blue);">Share My
                    Pledge</button>
                <a href="index.html" class="btn-primary">Make Another Pledge</a>
            </div>
        </div>
    </div>

    <!-- Curvilinear Footer Waves -->
    <div class="footer-waves">
        <svg class="wave-svg" viewBox="0 0 1440 320" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
            <path fill="#013188" d="M0,160 C320,300 1120,40 1440,240 L1440,320 L0,320 Z"></path>
            <path fill="#D0021B" d="M0,220 C480,350 1200,100 1440,280 L1440,320 L0,320 Z" style="opacity:0.9;"></path>
        </svg>
    </div>

    <script>
        // Security Check
        const photo = sessionStorage.getItem('last_photo');
        const name = sessionStorage.getItem('pledge_name');
        const msg = sessionStorage.getItem('pledge_msg');

        if (!photo) {
            window.location.href = 'index.html';
        } else {
            document.getElementById('finalPhoto').src = photo;
            document.getElementById('finalName').textContent = name;
            
            const msgEl = document.getElementById('finalMessage');
            if (msg) {
                msgEl.textContent = `"${msg}"`;
                msgEl.style.display = 'block';
            }
        }

        document.getElementById('shareBtn').onclick = () => {
            if (navigator.share) {
                navigator.share({
                    title: 'My Pledge for Women\'s Day',
                    text: 'I just pledged to support and empower every woman. #BeTheChange',
                    url: window.location.origin
                });
            } else {
                alert('Sharing is not supported on this browser.');
            }
        };
    </script>
</body>

</html>
