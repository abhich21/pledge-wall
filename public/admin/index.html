<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | BeTheChange</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .login-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 400px;
            margin: 100px auto;
        }
    </style>
</head>

<body style="background: var(--light-bg);">
    <div class="login-card">
        <h2 class="text-center text-blue" style="margin-bottom: 30px;">Admin Login</h2>
        <form id="loginForm">
            <div class="input-group">
                <label class="input-label">Email</label>
                <input type="email" id="email" class="input-field" placeholder="admin@bethechange.com" required>
            </div>
            <div class="input-group">
                <label class="input-label">Password</label>
                <div style="position: relative;">
                    <input type="password" id="password" class="input-field" placeholder="••••••••" required
                        style="padding-right: 45px;">
                    <button type="button" id="togglePassword"
                        style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; font-size: 18px; padding: 5px; color: #666;">
                        👁️
                    </button>
                </div>
            </div>
            <button type="submit" class="btn-primary" style="margin-top: 10px;">Login</button>
        </form>
    </div>

    <script>
        const toggleBtn = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');

        toggleBtn.onclick = () => {
            const isPassword = passwordInput.type === 'password';
            passwordInput.type = isPassword ? 'text' : 'password';
            toggleBtn.textContent = isPassword ? '🔒' : '👁️';
        };

        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const res = await fetch('/api/admin/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const data = await res.json();
            if (data.token) {
                localStorage.setItem('admin_token', data.token);
                window.location.href = 'dashboard.html';
            } else {
                alert(data.error || 'Login failed');
            }
        };
    </script>
</body>

</html>
